<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Thanh toán - Tech4Future</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #ffffff;
      color: #333333;
      font-family: system-ui, -apple-system, sans-serif;
      line-height: 1.6;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
      display: flex;
      gap: 30px;
      flex-wrap: wrap;
    }

    h1 {
      text-align: center;
      margin: 30px 0 20px;
      color: #212529;
    }

    .checkout-grid {
      flex: 1;
      min-width: 400px;
    }

    .section {
      background: #f8f9fa;
      padding: 25px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      margin-bottom: 25px;
    }

    .section h2 {
      font-size: 1.3rem;
      margin-bottom: 15px;
      color: #212529;
      border-bottom: 1px solid #dee2e6;
      padding-bottom: 10px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
      color: #495057;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ced4da;
      border-radius: 6px;
      font-size: 1rem;
    }

    .payment-methods label {
      display: block;
      padding: 12px;
      border: 1px solid #ced4da;
      border-radius: 6px;
      margin-bottom: 12px;
      cursor: pointer;
    }

    .payment-methods input[type="radio"] {
      margin-right: 10px;
    }

    .payment-details {
      margin-top: 8px;
      padding: 12px;
      background: #fff3cd;
      border: 1px dashed #ffc107;
      border-radius: 6px;
      font-size: 0.95rem;
    }

    .order-summary {
      width: 380px;
      background: #f8f9fa;
      padding: 25px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      align-self: flex-start;
    }

    .order-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      font-size: 1rem;
    }

    .order-total {
      font-weight: bold;
      font-size: 1.2rem;
      border-top: 1px solid #ced4da;
      padding-top: 15px;
      margin-top: 15px;
    }

    .btn-submit {
      width: 100%;
      padding: 14px;
      background: #28a745;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 1.1rem;
      cursor: pointer;
      margin-top: 20px;
    }

    .btn-submit:hover {
      background: #218838;
    }

    @media (max-width: 768px) {
      .container { flex-direction: column; }
      .order-summary { width: 100%; }
    }
  </style>
</head>
<body>

  <!-- Paste header chung của bạn vào đây -->

  <div class="container">
    <h1>Thanh toán đơn hàng</h1>

    <div class="checkout-grid">
      <!-- Thông tin giao hàng -->
      <div class="section">
        <h2>Thông tin giao hàng</h2>
        <form action="#" method="post"> <!-- Thay # bằng link xử lý backend nếu có -->
          <div class="form-group">
            <label for="full-name">Họ và tên</label>
            <input type="text" id="full-name" name="hoten" placeholder="Nguyễn Thị Ái Nhi" required>
          </div>
          <div class="form-group">
            <label for="phone">Số điện thoại</label>
            <input type="tel" id="phone" name="sodienthoai" placeholder="090xxxxxxx" required>
          </div>
          <div class="form-group">
            <label for="address">Địa chỉ giao hàng</label>
            <input type="text" id="address" name="diachi" placeholder="Số nhà, đường, phường/xã, quận/huyện, TP.HCM" required>
          </div>
          <div class="form-group">
            <label for="notes">Ghi chú (tùy chọn)</label>
            <textarea id="notes" name="ghichu" rows="3" placeholder="Ví dụ: Giao sau 18h, gọi trước khi giao..."></textarea>
          </div>

          <!-- Phương thức thanh toán -->
          <div class="section">
            <h2>Phương thức thanh toán</h2>
            <div class="payment-methods">
              <label>
                <input type="radio" name="payment_method" value="cod" checked>
                Thanh toán khi nhận hàng (COD)
              </label>

              <label>
                <input type="radio" name="payment_method" value="bank">
                Chuyển khoản ngân hàng
              </label>
            </div>
          </div>

          <button type="submit" class="btn-submit">Đặt hàng</button>
        </form>
      </div>
    </div>

    <!-- Tóm tắt đơn hàng (tĩnh) -->
    <div class="order-summary">
      <h2>Tóm tắt đơn hàng</h2>
      <div class="order-item">
        <span>RTX 4090 24GB x 1</span>
        <span>15.000.000 ₫</span>
      </div>
      <div class="order-item">
        <span>CPU Ryzen 9 7950X x 1</span>
        <span>4.500.000 ₫</span>
      </div>
      <div class="order-item">
        <span>Phí vận chuyển (ước tính)</span>
        <span>50.000 ₫</span>
      </div>
      <div class="order-total">
        <span>Tổng cộng</span>
        <span>19.550.000 ₫</span>
      </div>
      <p style="text-align: center; margin-top: 20px; font-size: 0.9rem; color: #6c757d;">
        Bằng cách đặt hàng, bạn đồng ý với <a href="#">Điều khoản dịch vụ</a> và <a href="#">Chính sách bảo mật</a>.
      </p>
    </div>
  </div>

  <!-- Paste footer chung của bạn vào đây -->

</body>
</html>
